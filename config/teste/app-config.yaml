app:
  title: Red Hat Developer Hub
  baseUrl: https://backstage-developer-hub-devhub.apps.UUUUUUUU.lab.intra.YYY.br
auth: 
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true
integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}
backend:
  baseUrl: https://backstage-developer-hub-devhub.apps.UUUUUUUU.lab.intra.YYY.br
  cors:
    origin: https://backstage-developer-hub-devhub.apps.UUUUUUUU.lab.intra.YYY.br
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: github.com

scaffolder:
  allowedHosts:
    - https://XXX.lab.intra.YYY.br

ansible:
  creatorService:
    baseUrl: 127.0.0.1
    port: '8000'

proxy:
  endpoints:
    '/aap':
      target: https://XXX.lab.intra.YY.br
      changeOrigin: true
      secure: false
      headers:
        Authorization: Bearer ${ANSIBLE_TOKEN}
        Content-Type: application/json
        Accept: application/json

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: ocp-cluster
          url: https://kubernetes.default.svc
          skipTLSVerify: true
          authProvider: serviceAccount
          serviceAccountToken: ${K8S_CLUSTER_TOKEN}
    
catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  locations:
    - type: url
      target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main/create-namespace.yaml
    - type: url
      target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main/create-namespace-quota-limit.yaml
    - type: url
      target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main./org.yaml
    - type: url
      target: https://github.com/ansible/ansible-rhdh-templates/blob/main/all.yaml
      rules:
        - allow: [Template]
