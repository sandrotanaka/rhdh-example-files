app:
  title: Red Hat Developer Hub
  baseUrl: https://backstage-developer-hub-devhub.apps.XXXXX.lab.intra.YYYY.br
auth: 
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true
integrations:
  github:
    - host: github.com
      #token: ${GITHUB_TOKEN}
  azure:
    - host: dev.azure.com
      credentials:
        - personalAccessToken: XXX

backend:
  baseUrl: https://backstage-developer-hub-devhub.apps.XXXXX.lab.intra.YYYY.br
  cors:
    origin: https://backstage-developer-hub-devhub.apps.XXXXX.lab.intra.YYYY.br
  reading:
    allow:
      - host: raw.githubusercontent.com
      - host: github.com
      - host: dev.azure.com

azureDevOps:
  host: dev.azure.com
  organization: organization

scaffolder:
  allowedHosts:
    - https://AAAA.lab.intra.XXX.br

ansible:
  creatorService:
    baseUrl: 127.0.0.1
    port: '8000'
  rhaap:
    baseUrl: 'https://AAAA.lab.intra.XXX.br'
    token: 'RRRRR'
    checkSSL: true
proxy:
  endpoints:
    '/aap':
      target: https://aapm.lab.intra.rs.gov.br
      changeOrigin: true
      secure: false
      headers:
        #Authorization: Bearer ${ANSIBLE_TOKEN}
        Authorization: Bearer TTTTTTTTT
        Content-Type: application/json
        Accept: application/json

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: ocp-cluster
          #url: https://kubernetes.default.svc
          url: https://api.QQQQQ.lab.intra.XXXX.br:6443
          token: "AQUI"
          skipTLSVerify: true
          authProvider: serviceAccount
          #serviceAccountToken: ${K8S_CLUSTER_TOKEN}
custom:
  namespaceDefaults:
    consoleBaseUrl: https://console-openshift-console.apps.killab4840.lab.intra.rs.gov.br
    defaultLabels: "kubernetes.io/type=namespace;managed-by=rhdh"
    
catalog:
  rules:
    - allow: [Component, System, API, Resource, Location, Template, Group, User]
  providers:
    azureDevOps:
      sandrotanaka:
        organization: "sandrotanaka"
        project: "*"
        repository: "*"
        path: "/catalog-info.yaml"
        schedule:
          frequency:
            minutes: 5
          timeout:
            minutes: 3
  locations:
    - type: url
      #target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main/create-namespace.yaml
      target: https://github.com/sandrotanaka/rhdh-example-files/blob/main/templates/create-new-namespace.yaml
    - type: url
      target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main/create-namespace-quota-limit.yaml
    - type: url
      target: https://github.com/sandrotanaka/rhdh-template-poc/blob/main/org.yaml
    - type: url
      target: https://github.com/ansible/ansible-rhdh-templates/blob/main/all.yaml
      #rules:
      #  - allow: [Template]
