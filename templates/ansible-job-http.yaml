apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ansible-job-http-test
  title: Teste Ansible via HTTP
  description: Executa um Job Template do Ansible Automation Platform via API HTTP
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Parâmetros do Job
      required:
        - controllerUrl
        - jobTemplateId
        - ansibleToken
      properties:
        controllerUrl:
          title: URL do Automation Controller
          type: string
          default: https://seu-controller.exemplo.com
          description: URL base do AAP Controller

        jobTemplateId:
          title: ID do Job Template
          type: string
          description: Exemplo 42

        ansibleToken:
          title: Token do AAP
          type: string
          ui:widget: password
          description: Token Bearer do Automation Controller

        mensagem:
          title: Mensagem de teste
          type: string
          default: hello-from-rhdh

  steps:
    - id: launch-job
      name: Disparando Job Template no Ansible
      action: http:backstage:request
      input:
        method: POST
        url: '${{ parameters.controllerUrl }}/api/v2/job_templates/${{ parameters.jobTemplateId }}/launch/'
        headers:
          Content-Type: application/json
          Authorization: 'Bearer ${{ parameters.ansibleToken }}'
        body:
          extra_vars:
            mensagem: '${{ parameters.mensagem }}'

  output:
    text:
      - title: Resultado
        content: |
          Job enviado com sucesso.
          Resposta da API:
          ${{ steps['launch-job'].output.body }}
