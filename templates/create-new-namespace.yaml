apiVersion: scaffolder.backstage.io/v1beta3
kind: Template

metadata:
  name: create-namespace-sa
  title: Criar Namespace OpenShift (ServiceAccount)
  description: Cria um namespace no cluster OpenShift usando autenticação via ServiceAccount
  tags:
    - kubernetes
    - openshift
    - namespace

spec:
  owner: user:default/guest
  type: service

  parameters:
    - title: Dados do Namespace
      required:
        - namespace
      properties:
        namespace:
          title: Nome do namespace
          type: string
          description: Nome do namespace que será criado
          pattern: '^[a-z0-9]([-a-z0-9]*[a-z0-9])?$'
          ui:autofocus: true

  steps:
    - id: create-namespace
      name: Criar namespace no OpenShift
      action: kubernetes:create-namespace
      input:
        namespace: ${{ parameters.namespace }}
        clusterRef: ocp-cluster

  output:
    text:
      - title: Namespace criado
        content: |
          O namespace `${{ parameters.namespace }}` foi enviado para criação no cluster `ocp-cluster`.
